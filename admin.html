<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Million Real Homepage</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root { --green:#00e064; --yellow:#ffe600; --black:#080808; --gray:#141414; --border:#242424; --white:#f0f0eb; }
* { margin:0;padding:0;box-sizing:border-box; }
body { background:var(--black);color:var(--white);font-family:'Space Mono',monospace;font-size:0.8rem; }
header {
  background:var(--gray); border-bottom:1px solid var(--border);
  padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center;
}
.logo { font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--green); }
.login-screen {
  max-width:360px;margin:8rem auto;padding:2rem;
  border:1px solid var(--border);background:var(--gray);
}
.login-screen h2 { font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--green);margin-bottom:1.5rem; }
input {
  width:100%;background:var(--black);border:1px solid var(--border);
  color:var(--white);padding:0.7rem 1rem;font-family:'Space Mono',monospace;
  font-size:0.8rem;outline:none;margin-bottom:1rem;
}
input:focus { border-color:var(--green); }
.btn {
  background:var(--green);color:var(--black);border:none;padding:0.75rem 1.5rem;
  font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;
  cursor:pointer;width:100%;
}
.btn:hover { background:var(--yellow); }
.btn-sm {
  background:none;border:1px solid var(--border);color:#555;
  padding:0.3rem 0.8rem;font-family:'Space Mono',monospace;font-size:0.6rem;
  cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all 0.15s;
}
.btn-sm.approve { border-color:#00e064;color:#00e064; }
.btn-sm.reject  { border-color:#ff3b3b;color:#ff3b3b; }
.btn-sm:hover   { opacity:0.7; }
.dashboard { padding:2rem; display:none; }
.stats-row { display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1px;background:var(--border);margin-bottom:2rem; }
.stat-card { background:var(--gray);padding:1.5rem; }
.stat-card .sn { font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--green);line-height:1; }
.stat-card .sl { font-size:0.6rem;text-transform:uppercase;letter-spacing:1px;color:#444;margin-top:0.3rem; }
.section-title { font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;margin-bottom:1rem; }
table { width:100%;border-collapse:collapse; }
th { text-align:left;padding:0.6rem 0.8rem;border-bottom:1px solid var(--border);font-size:0.6rem;text-transform:uppercase;letter-spacing:1px;color:#444; }
td { padding:0.7rem 0.8rem;border-bottom:1px solid #111;vertical-align:middle; }
tr:hover td { background:var(--gray); }
.badge {
  display:inline-block;padding:0.15rem 0.6rem;font-size:0.58rem;text-transform:uppercase;letter-spacing:1px;
}
.badge-pending  { border:1px solid #555;color:#555; }
.badge-approved { border:1px solid var(--green);color:var(--green); }
.badge-rejected { border:1px solid #ff3b3b;color:#ff3b3b; }
.actions { display:flex;gap:0.4rem; }
.empty { color:#333;padding:2rem;text-align:center; }
</style>
</head>
<body>

<header>
  <div class="logo">ADMIN — MillionReal</div>
  <div id="headerInfo" style="font-size:0.65rem;color:#444;"></div>
</header>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <h2>Login Admin</h2>
  <input type="password" id="passInput" placeholder="Senha de admin" onkeydown="if(event.key==='Enter')login()">
  <button class="btn" onclick="login()">ENTRAR →</button>
  <div id="loginErr" style="color:#ff3b3b;font-size:0.65rem;margin-top:0.8rem;"></div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="stats-row" id="statsRow"></div>

  <div class="section-title">Pedidos Recentes</div>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Comprador</th>
        <th>Pixels</th>
        <th>Valor</th>
        <th>Status</th>
        <th>Data</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="ordersBody">
      <tr><td colspan="7" class="empty">Carregando pedidos...</td></tr>
    </tbody>
  </table>

</div>

<script>
// ── CONFIG ──
// Mesma senha do seu .env ou defina aqui
const ADMIN_PASS = 'admin123'; // ← TROQUE ANTES DE PUBLICAR

const SUPABASE_URL = 'https://XXXX.supabase.co'; // ← seu Supabase
const SUPABASE_KEY = 'sua_anon_key_aqui';          // ← sua key

let orders = [];

function login() {
  const val = document.getElementById('passInput').value;
  if (val === ADMIN_PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('headerInfo').textContent = '✅ logado como admin';
    loadOrders();
  } else {
    document.getElementById('loginErr').textContent = 'Senha incorreta.';
  }
}

async function loadOrders() {
  // Descomente após configurar Supabase:
  // const res = await fetch(`${SUPABASE_URL}/rest/v1/pixels?select=*&order=created_at.desc`, {
  //   headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  // });
  // orders = await res.json();

  // DEMO DATA
  orders = [
    { id: 1, name: 'Empresa Demo',  email: 'demo@empresa.com', pixel_keys: new Array(500).fill(0),  amount: 500,  status: 'pending',  created_at: new Date().toISOString() },
    { id: 2, name: 'Startup BR',    email: 'oi@startup.com.br', pixel_keys: new Array(1000).fill(0), amount: 1000, status: 'approved', created_at: new Date().toISOString() },
    { id: 3, name: 'Loja Virtual',  email: 'loja@mail.com',    pixel_keys: new Array(200).fill(0),  amount: 200,  status: 'pending',  created_at: new Date().toISOString() },
  ];

  renderStats();
  renderOrders();
}

function renderStats() {
  const total    = orders.length;
  const approved = orders.filter(o => o.status === 'approved').length;
  const pending  = orders.filter(o => o.status === 'pending').length;
  const revenue  = orders.filter(o => o.status === 'approved').reduce((s, o) => s + o.amount, 0);
  const pixels   = orders.filter(o => o.status === 'approved').reduce((s, o) => s + o.pixel_keys.length, 0);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="sn">R$${revenue.toLocaleString('pt-BR')}</div><div class="sl">receita total</div></div>
    <div class="stat-card"><div class="sn">${pixels.toLocaleString('pt-BR')}</div><div class="sl">pixels vendidos</div></div>
    <div class="stat-card"><div class="sn">${approved}</div><div class="sl">pedidos aprovados</div></div>
    <div class="stat-card"><div class="sn" style="color:var(--yellow)">${pending}</div><div class="sl">pendentes</div></div>
    <div class="stat-card"><div class="sn">${total}</div><div class="sl">pedidos totais</div></div>
  `;
}

function renderOrders() {
  const tbody = document.getElementById('ordersBody');
  if (orders.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">Nenhum pedido ainda.</td></tr>';
    return;
  }
  tbody.innerHTML = orders.map(o => `
    <tr>
      <td style="color:#444">#${o.id}</td>
      <td>
        <div>${o.name}</div>
        <div style="color:#444;font-size:0.65rem">${o.email}</div>
      </td>
      <td style="color:var(--green)">${o.pixel_keys.length.toLocaleString('pt-BR')}</td>
      <td style="color:var(--yellow)">R$${o.amount.toLocaleString('pt-BR')}</td>
      <td><span class="badge badge-${o.status}">${o.status}</span></td>
      <td style="color:#444;font-size:0.65rem">${new Date(o.created_at).toLocaleString('pt-BR')}</td>
      <td>
        <div class="actions">
          ${o.status === 'pending' ? `
            <button class="btn-sm approve" onclick="approve(${o.id})">APROVAR</button>
            <button class="btn-sm reject"  onclick="reject(${o.id})">REJEITAR</button>
          ` : `<span style="color:#333;font-size:0.65rem">—</span>`}
        </div>
      </td>
    </tr>
  `).join('');
}

function approve(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  o.status = 'approved';
  // await fetch(`${SUPABASE_URL}/rest/v1/pixels?id=eq.${id}`, { method: 'PATCH', ... })
  renderStats(); renderOrders();
  alert(`✅ Pedido #${id} aprovado! Pixels ativados.`);
}

function reject(id) {
  if (!confirm('Rejeitar este pedido?')) return;
  const o = orders.find(x => x.id === id);
  if (!o) return;
  o.status = 'rejected';
  renderStats(); renderOrders();
}
</script>
</body>
</html>
